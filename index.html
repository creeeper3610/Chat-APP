<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Firestore リアルタイムチャット</title>
    <style>
        :root {
            --line-green: #7493cd; /* トーク画面の背景色 */
            --my-balloon: #85e249; /* 自分の吹き出し */
            --other-balloon: #ffffff; /* 他人の吹き出し */
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            height: 100vh;
            box-sizing: border-box;
        }
        .app-container {
            display: flex;
            width: 100%;
            max-width: 1000px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        /* 左側：サイドバー */
        .sidebar {
            width: 320px;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            background: #fafafa;
        }
        .sidebar-header {
            padding: 15px;
            border-bottom: 1px solid #ddd;
            background: #fff;
        }
        .sidebar-header h2 {
            font-size: 16px;
            margin: 0 0 10px 0;
            color: #333;
        }
        .input-box-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 5px;
        }
        .inline-form {
            display: flex;
            gap: 5px;
        }
        .inline-form input {
            flex: 1;
            padding: 6px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
        }
        .inline-form button {
            background: #242424;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            white-space: nowrap;
        }
        .tab-menu {
            display: flex;
            border-bottom: 1px solid #eee;
            background: #f1f1f1;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            color: #666;
            text-align: center;
        }
        .tab-btn.active {
            background: #fff;
            color: #242424;
            border-top: 2px solid #5c7fbc;
        }
        .list-container {
            flex: 1;
            overflow-y: auto;
        }
        .item-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .list-item {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background 0.2s;
        }
        .list-item:hover { background: #f0f0f0; }
        .list-item.active { background: #e6edf7; font-weight: bold; }
        .item-title { font-size: 14px; color: #333; margin-bottom: 3px; }
        .item-sub { font-size: 11px; color: #888; font-family: monospace; background: #eee; padding: 1px 4px; border-radius: 3px; display: inline-block; }

        /* 右側：メインチャット画面 */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--line-green);
        }
        .chat-header {
            background: #fff;
            padding: 15px;
            border-bottom: 1px solid #ddd;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-header .current-id { font-size: 12px; font-weight: normal; color: #666; }
        
        .message-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .msg-row {
            display: flex;
            flex-direction: column;
            width: 100%;
        }
        .msg-row.me { align-items: flex-end; }
        .msg-row.other { align-items: flex-start; }
        
        .sender-info { font-size: 11px; color: #fff; margin-bottom: 3px; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
        .msg-row.me .sender-info { display: none; }

        .balloon {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 15px;
            font-size: 15px;
            word-break: break-all;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .msg-row.me .balloon {
            background: var(--my-balloon);
            color: #000;
            border-top-right-radius: 2px;
        }
        .msg-row.other .balloon {
            background: var(--other-balloon);
            color: #000;
            border-top-left-radius: 2px;
        }

        .input-area {
            background: #fff;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .input-row {
            display: flex;
            gap: 10px;
        }
        .input-row textarea {
            flex: 1;
            height: 40px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            resize: none;
            font-size: 15px;
        }
        .input-row button {
            background: #5c7fbc;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
        }
        .input-row button:hover { background: #4a6fa5; }
        
        /* 設定エリア・プレースホルダー */
        .config-box {
            background: #fcfcfc;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
            margin-bottom: 10px;
            font-size: 13px;
        }
        .config-row {
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .config-row input {
            padding: 4px 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            flex: 1;
        }
        .no-chat-placeholder {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- 左側：サイドバー（設定・操作エリア） -->
    <div class="sidebar">
        <div class="sidebar-header">
            <!-- 👤 自分のプロフィール・設定エリア -->
            <div class="config-box">
                <div class="config-row">
                    <strong>👤 マイプロフィール</strong>
                </div>
                <div class="config-row">
                    <span>名前:</span>
                    <input type="text" id="myUserName" value="ユーザー1" onchange="updateProfile()">
                </div>
                <div class="config-row">
                    <span>自分のID:</span>
                    <span id="myUserId" style="font-family:monospace; background:#e0e0e0; padding:2px 6px; border-radius:3px; font-weight:bold;">---</span>
                </div>
            </div>

            <!-- ➕ アクション入力欄（グループ作成・ID参加・友達追加） -->
            <div class="input-box-group">
                <!-- 1. グループ新規作成 -->
                <div class="inline-form">
                    <input type="text" id="newGroupName" placeholder="新しいグループ名を入力...">
                    <button onclick="createNewGroup()">作成</button>
                </div>
                <!-- 2. グループIDで参加 -->
                <div class="inline-form">
                    <input type="text" id="joinGroupId" placeholder="参加するグループIDを入力...">
                    <button onclick="joinGroupById()" style="background:#5c7fbc;">参加</button>
                </div>
                <!-- 3. 友達IDを追加 -->
                <div class="inline-form">
                    <input type="text" id="targetFriendId" placeholder="友達のユーザーIDを入力...">
                    <button onclick="addFriendById()" style="background:#28a745;">友達追加</button>
                </div>
            </div>
        </div>

        <!-- 📑 タブメニュー切り替え -->
        <div class="tab-menu">
            <button id="tabChat" class="tab-btn active" onclick="switchTab('chat')">💬 トーク一覧</button>
            <button id="tabFriend" class="tab-btn" onclick="switchTab('friend')">👥 友達一覧</button>
        </div>

        <!-- 📜 各種一覧の表示コンテナ -->
        <div class="list-container">
            <!-- チャットトーク一覧 -->
            <ul id="chatList" class="item-list"></ul>
            <!-- 友達一覧 -->
            <ul id="friendList" class="item-list" style="display:none;"></ul>
        </div>
    </div>

    <!-- 右側：メインチャット画面 -->
    <div id="chatMain" class="chat-main">
        <div class="no-chat-placeholder" id="placeholderText">トーク（グループまたは友達）を選択するか、新しく作成・参加してください。</div>
        
        <!-- トーク選択後に表示されるエリア -->
        <div id="chatContent" style="display:none; flex:1; flex-direction:column; overflow:hidden;">
            <div class="chat-header">
                <div>
                    <span id="currentRoomName" style="margin-right: 8px;">トーク相手・グループ名</span>
                </div>
                <span class="current-id">ルームID: <span id="currentRoomId">---</span></span>
            </div>
            
            <!-- LINE風メッセージ表示エリア -->
            <div id="messageArea" class="message-area"></div>
            
            <!-- メッセージ入力フォーム -->
            <div class="input-area">
                <div class="input-row">
                    <textarea id="messageInput" placeholder="メッセージを入力... (Enterで送信)" onkeydown="handleEnter(event)"></textarea>
                    <button onclick="sendMessage()">送信</button>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- Firebase SDKの読み込み（CDN経由・Modular v10対応） -->
<script type="module">
    import { initializeApp } from "https://gstatic.com";
    import { 
        getFirestore, 
        collection, 
        doc, 
        setDoc, 
        addDoc, 
        onSnapshot, 
        query, 
        orderBy, 
        serverTimestamp 
    } from "https://gstatic.com";

    // --- Firebase の接続設定 ---
    // ※ご自身のFirebaseプロジェクトの設定値に書き換えてください。
    const firebaseConfig = {
        apiKey: "YOUR_FIREBASE_API_KEY",
        authDomain: "YOUR_PROJECT_://firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT_://appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    // Firebaseの初期化
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- ローカルストレージ用キー定義（部屋一覧と友達一覧はローカルで管理） ---
    const KEY_MY_INFO     = 'line_fb_my_info';     
    const KEY_ROOM_LIST   = 'line_fb_room_list';   
    const KEY_FRIEND_LIST = 'line_fb_friend_list'; 

    // --- グローバル状態管理 ---
    let myInfo = { id: '', name: 'ユーザー1' };
    let currentRoomId = null;
    let currentTab = 'chat'; 
    let unsubscribeMessages = null; // リアルタイムリスナー解除用関数

    // --- 1. 初期化処理 ---
    window.addEventListener('DOMContentLoaded', () => {
        initMyProfile();
        loadRoomList();
        loadFriendList();
        setupGlobalFunctions(); // HTMLのonclick属性から関数を呼べるようにグローバル展開
    });

    // 自分のプロフィール初期化（なければ自動生成）
    function initMyProfile() {
        const saved = localStorage.getItem(KEY_MY_INFO);
        if (saved) {
            myInfo = JSON.parse(saved);
        } else {
            myInfo.id = 'uid-' + Math.random().toString(36).substring(2, 10);
            localStorage.setItem(KEY_MY_INFO, JSON.stringify(myInfo));
        }
        document.getElementById('myUserId').textContent = myInfo.id;
        document.getElementById('myUserName').value = myInfo.name;
    }

    function updateProfile() {
        const nameInput = document.getElementById('myUserName').value.trim();
        if (!nameInput) return alert('名前を入力してください');
        myInfo.name = nameInput;
        localStorage.setItem(KEY_MY_INFO, JSON.stringify(myInfo));
    }

    function generateRandomId(prefix) {
        return prefix + '-' + Math.random().toString(36).substring(2, 10);
    }

    // --- 2. タブ切り替え ---
    function switchTab(tab) {
        currentTab = tab;
        document.getElementById('tabChat').classList.toggle('active', tab === 'chat');
        document.getElementById('tabFriend').classList.toggle('active', tab === 'friend');
        document.getElementById('chatList').style.display = tab === 'chat' ? 'block' : 'none';
        document.getElementById('friendList').style.display = tab === 'friend' ? 'block' : 'none';
    }

    // --- 3. グループ作成・ID参加機能 ---
    function createNewGroup() {
        const input = document.getElementById('newGroupName');
        const name = input.value.trim();
        if (!name) return alert('グループ名を入力してください');

        const roomId = generateRandomId('group');
        addRoomToStorage(roomId, name, 'group');

        input.value = '';
        switchTab('chat');
        selectRoom(roomId, name);
    }

    function joinGroupById() {
        const input = document.getElementById('joinGroupId');
        const roomId = input.value.trim();
        if (!roomId) return alert('グループIDを入力してください');

        const rooms = JSON.parse(localStorage.getItem(KEY_ROOM_LIST)) || [];
        const exists = rooms.find(r => r.id === roomId);
        if (exists) {
            input.value = '';
            return selectRoom(exists.id, exists.name);
        }

        // 外部参加用として、該当IDの部屋をローカルのリストに追加
        addRoomToStorage(roomId, '外部参加グループ', 'group');
        input.value = '';
        switchTab('chat');
        selectRoom(roomId, '外部参加グループ');
    }

    // --- 4. 友達追加機能（双方向ルームの決定） ---
    function addFriendById() {
        const input = document.getElementById('targetFriendId');
        const friendId = input.value.trim();

        if (!friendId) return alert('友達のユーザーIDを入力してください');
        if (friendId === myInfo.id) return alert('自分のIDは追加できません');

        let friends = JSON.parse(localStorage.getItem(KEY_FRIEND_LIST)) || [];
        if (!friends.includes(friendId)) {
            friends.push(friendId);
            localStorage.setItem(KEY_FRIEND_LIST, JSON.stringify(friends));
        }

        // 双方向で一意になる部屋IDを生成（ソートして結合）
        const sortedIds = [myInfo.id, friendId].sort();
        const pairRoomId = `pair-${sortedIds[0]}-${sortedIds[1]}`;

        addRoomToStorage(pairRoomId, `友達 (${friendId})`, 'private');

        input.value = '';
        loadFriendList();
        loadRoomList();
        switchTab('chat');
        selectRoom(pairRoomId, `友達 (${friendId})`);
    }

    function addRoomToStorage(id, name, type) {
        let rooms = JSON.parse(localStorage.getItem(KEY_ROOM_LIST)) || [];
        if (!rooms.some(r => r.id === id)) {
            rooms.push({ id: id, name: name, type: type });
            localStorage.setItem(KEY_ROOM_LIST, JSON.stringify(rooms));
        }
        loadRoomList();
    }

    // --- 5. 一覧表示（描画）ロジック ---
    function loadRoomList() {
        const rooms = JSON.parse(localStorage.getItem(KEY_ROOM_LIST)) || [];
        const listEl = document.getElementById('chatList');
        listEl.innerHTML = '';

        rooms.forEach(room => {
            const li = document.createElement('li');
            li.className = `list-item ${room.id === currentRoomId ? 'active' : ''}`;
            li.onclick = () => selectRoom(room.id, room.name);
            li.innerHTML = `
                <div class="item-title">${escapeHTML(room.name)}</div>
                <span class="item-sub">${room.id}</span>
            `;
            listEl.appendChild(li);
        });
    }

    function loadFriendList() {
        const friends = JSON.parse(localStorage.getItem(KEY_FRIEND_LIST)) || [];
        const listEl = document.getElementById('friendList');
        listEl.innerHTML = '';

        friends.forEach(fId => {
            const li = document.createElement('li');
            li.className = 'list-item';
            li.onclick = () => {
                const sortedIds = [myInfo.id, fId].sort();
                const pairRoomId = `pair-${sortedIds[0]}-${sortedIds[1]}`;
                switchTab('chat');
                selectRoom(pairRoomId, `友達 (${fId})`);
            };
            li.innerHTML = `
                <div class="item-title">👤 ユーザー: ${escapeHTML(fId)}</div>
                <span class="item-sub">STATUS: 友達登録済み</span>
            `;
            listEl.appendChild(li);
        });
    }

    // --- 6. Firestoreリアルタイムリスナー接続コア ---
    function selectRoom(id, name) {
        currentRoomId = id;
        document.getElementById('placeholderText').style.display = 'none';
        document.getElementById('chatContent').style.display = 'flex';
        document.getElementById('currentRoomName').textContent = name;
        document.getElementById('currentRoomId').textContent = id;

        loadRoomList();

        // 既存のリスナーがあれば解除
        if (unsubscribeMessages) {
            unsubscribeMessages();
        }

        // 【重要】Firestoreのリアルタイムリスナー機能（onSnapshot）
        // 画面を更新しなくても、コレクション内にドキュメントが追加されると自動検知して動き出します。
        const msgRef = collection(db, "rooms", currentRoomId, "messages");
        const q = query(msgRef, orderBy("timestamp", "asc"));

        unsubscribeMessages = onSnapshot(q, (snapshot) => {
            const area = document.getElementById('messageArea');
            area.innerHTML = '';

            snapshot.forEach((doc) => {
                const msg = doc.data();
                const row = document.createElement('div');
                const isMe = (msg.senderId === myInfo.id);
                row.className = `msg-row ${isMe ? 'me' : 'other'}`;

                row.innerHTML = `
                    <div class="sender-info">${escapeHTML(msg.senderName)} (${escapeHTML(msg.senderId)})</div>
                    <div class="balloon">${escapeHTML(msg.text || '').replace(/\n/g, '<br>')}</div>
                `;
                area.appendChild(row);
            });
            area.scrollTop = area.scrollHeight; // 最下部へスクロール
        });
    }

    // メッセージ送信（Firestoreへの書き込み）
    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text || !currentRoomId) return;

        try {
            // 指定ルームのサブコレクションにメッセージデータを保存
            const msgRef = collection(db, "rooms", currentRoomId, "messages");
            await addDoc(msgRef, {
                senderId: myInfo.id,
                senderName: myInfo.name,
                text: text,
                timestamp: serverTimestamp() // サーバー時間を使用
            });
            input.value = '';
        } catch (error) {
            console.error("送信エラー:", error);
            alert("送信に失敗しました。プロジェクトの設定やセキュリティルールを確認してください。");
        }
    }

    // --- 7. 各種ユーティリティ関数 ---
    function handleEnter(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }

    function escapeHTML(str) {
        return str.replace(/[&<>"']/g, match => {
            const escape = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#x27;' };
            return escape[match];
        });
    }

    // `<script type="module">` 内の関数をHTMLのボタン（onclick）から呼べるようにwindowに公開
    function setupGlobalFunctions() {
        window.updateProfile = updateProfile;
        window.createNewGroup = createNewGroup;
        window.joinGroupById = joinGroupById;
        window.addFriendById = addFriendById;
        window.switchTab = switchTab;
        window.sendMessage = sendMessage;
        window.handleEnter = handleEnter;
    }
</script>
    
</body>
</html>
